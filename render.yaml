services:
  - type: web
    name: pid-oportunidades
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: ENVIRONMENT
        value: production
      - key: CORS_ALLOW_ORIGINS
        value: https://pid-six.vercel.app,https://pid-oportunidades.vercel.app
